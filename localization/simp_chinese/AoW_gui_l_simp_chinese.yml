  STATE_MAGE_AWAKENING_BREAKDOWN: "#header 每年自然觉醒率#!\n[State.GetName] 每年觉醒 [State.MakeScope.ScriptValue('state_mage_effective_awakening_rate')|%0]\n$TOOLTIP_DELIMITER$\n[State.GetModifier.GetFullEntryDescFor('state_mage_awakening_rate')]"
